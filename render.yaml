services:
  - type: web
    name: wcm-portfolio-site
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # NOTE: Render static sites require headers to be configured in the
    # Render Dashboard (Settings > Headers), not in this file.
    # The values below are kept as documentation of the intended headers.
    # See: https://render.com/docs/static-site-headers
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' https://static.cloudflareinsights.com; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'"
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), interest-cohort=()'
      - path: /*
        name: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      - path: /*
        name: Cache-Control
        value: 'no-cache'
      - path: /assets/*
        name: Cache-Control
        value: 'public, max-age=31536000, immutable'
