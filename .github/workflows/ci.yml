name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [dev, main]

jobs:
  gate-main-source:
    uses: wcmchenry3-stack/.github/.github/workflows/called-gate-main-source.yml@main
    secrets: inherit

  secret-scan:
    uses: wcmchenry3-stack/.github/.github/workflows/called-secret-scan.yml@main
    secrets: inherit

  lint:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-frontend.yml@main
    with:
      working-directory: .
      run-a11y: true
    secrets: inherit

  test:
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-frontend.yml@main
    with:
      working-directory: .
      coverage-threshold: 80
    secrets: inherit

  build:
    uses: wcmchenry3-stack/.github/.github/workflows/called-build-frontend.yml@main
    with:
      working-directory: .
    secrets: inherit

  cve:
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-frontend.yml@main
    with:
      working-directory: .
      audit-level: high
    secrets: inherit

  perf-lighthouse:
    uses: wcmchenry3-stack/.github/.github/workflows/called-perf-frontend.yml@main
    with:
      build-command: npm run build
      dist-dir: dist
      lhci-config: lighthouserc.json
    secrets: inherit

  perf-bundle:
    name: Bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run size
