name: i18n string check

on:
  pull_request:
    branches: [dev, main]

jobs:
  check:
    name: Check for untranslated strings
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run i18n check
        id: i18n
        run: |
          node scripts/check-i18n-strings.js --output-json > /tmp/i18n-result.json
          total=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/tmp/i18n-result.json','utf8')).totalMissing))")
          echo "total=$total" >> "$GITHUB_OUTPUT"
          {
            echo 'result<<I18N_EOF'
            cat /tmp/i18n-result.json
            echo I18N_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment if strings are missing
        if: steps.i18n.outputs.total != '0'
        uses: actions/github-script@v8
        env:
          I18N_RESULT: ${{ steps.i18n.outputs.result }}
        with:
          script: |
            const data = JSON.parse(process.env.I18N_RESULT);
            const { totalMissing, results } = data;

            let body = `## ⚠ i18n — ${totalMissing} untranslated string(s) detected\n\n`;
            body += 'The following keys still have `__NEEDS_TRANSLATION__` values:\n\n';

            for (const [locale, nses] of Object.entries(results)) {
              for (const [ns, missing] of Object.entries(nses)) {
                if (missing.length === 0) continue;
                body += `**\`${locale}/${ns}.json\`** — ${missing.length} missing\n`;
                missing.forEach(k => { body += `- \`${k}\`\n`; });
                body += '\n';
              }
            }

            body += '---\n';
            body += 'To translate: `node scripts/translate.js --locale <code> --namespace <ns>`\n';
            body += '_This check is **warn-only** and will not block merge._';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
